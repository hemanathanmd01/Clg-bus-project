<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Campus Bus Terminal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Boxicons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific Styles for Login */
        body {
            background-color: var(--app-bg);
            background-image: linear-gradient(135deg, var(--app-bg) 0%, #dbeafe 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        .login-container {
            background-color: var(--card-bg);
            border-radius: 1.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            width: 90%;
            max-width: 420px;
            padding: 2.5rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-sizing: border-box;
        }

        .login-logo {
            width: 80px;
            height: 80px;
            background-color: var(--primary-light);
            border-radius: 1.25rem;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 1.5rem;
            color: var(--primary);
            font-size: 2.5rem;
        }

        .login-container h1 {
            font-size: 1.5rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .login-container p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2.5rem;
        }

        .form-group {
            width: 100%;
            margin-bottom: 1.5rem;
            text-align: left;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.8rem;
            border: 1px solid var(--border);
            border-radius: 0.8rem;
            font-size: 0.95rem;
            transition: all 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #cbd5e1;
        }

        .form-group i {
            position: absolute;
            left: 1rem;
            bottom: 1rem;
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        .login-btn {
            width: 100%;
            padding: 0.9rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 0.8rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }

        .login-btn:hover {
            background-color: var(--primary-hover);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .error-message {
            color: var(--danger);
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
            background-color: var(--danger-bg);
            padding: 0.8rem;
            border-radius: 0.5rem;
            width: 100%;
            text-align: left;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="login-logo" style="background-color: transparent; width: auto; height: auto;">
            <img src="logo.png" alt="SRM TRP Engineering College Logo" style="max-width: 200px; height: auto;">
        </div>
        <h1>Welcome Back</h1>
        <p>Enter your credentials to access the terminal</p>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Username / Admin ID</label>
                <i class='bx bx-user'></i>
                <input type="text" id="username" placeholder="admin" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <i class='bx bx-lock-alt'></i>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn">Sign In to Dashboard</button>
            <div class="error-message" id="errorMsg">
                <i class='bx bx-error-circle'></i> Invalid credentials. Please use 'admin' / 'admin'.
            </div>
        </form>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            // Simple demo authentication
            if (user === 'admin' && pass === 'admin') {
                errorMsg.style.display = 'none';

                // Add a small loading effect
                const btn = document.querySelector('.login-btn');
                btn.innerHTML = "<i class='bx bx-loader-alt bx-spin'></i> Authenticating...";
                btn.style.opacity = '0.8';

                // Redirect to dashboard after 1 second
                setTimeout(() => {
                    window.location.href = 'Bus.html';
                }, 1000);
            } else {
                errorMsg.style.display = 'block';
                // Shake animation for error
                const container = document.querySelector('.login-container');
                container.style.animation = 'shake 0.4s';
                setTimeout(() => container.style.animation = '', 400);
            }
        }
    </script>
    <style>
        @keyframes shake {
            0% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-8px);
            }

            50% {
                transform: translateX(8px);
            }

            75% {
                transform: translateX(-8px);
            }

            100% {
                transform: translateX(0);
            }
        }

        </script></body></html>
